name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write # required to assume the AWS role via OIDC
  contents: read

env:
  AWS_REGION: eu-west-1
  AWS_ACCOUNT_ID: "817685572750"

jobs:
  test:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ai-systmem-design-studio-deploy
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Deploy
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          STUDIO_PASSPHRASE: aislgym
          SESSION_SECRET: ${{ secrets.STUDIO_SESSION_SECRET }}
        run: bash scripts/deploy.sh
