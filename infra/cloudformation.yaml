AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AI System Design Studio — Express app on Lambda served via a streaming Function
  URL (RESPONSE_STREAM + Lambda Web Adapter) for true token streaming. The custom
  domain (sds.dtcdev.click) stays on the API Gateway HTTP API + regional ACM cert
  and 301-redirects to the Function URL. Fully declarative CloudFormation.
  Stateless (no database).

Parameters:
  CodeBucket:
    Type: String
    Description: S3 bucket holding the built Lambda zip
  CodeKey:
    Type: String
    Description: S3 key of the Lambda zip
  DomainName:
    Type: String
    Default: sds.dtcdev.click
  HostedZoneId:
    Type: String
    Default: Z05963572WVWFHDQZH5NE
    Description: Route53 hosted zone id for dtcdev.click (authoritative zone)
  ZaiApiKey:
    Type: String
    NoEcho: true
    Description: Z.AI (Anthropic-compatible) API key
  ZaiModel:
    Type: String
    Default: glm-5.2
  ZaiBaseUrl:
    Type: String
    Default: https://api.z.ai/api/anthropic
  Passphrase:
    Type: String
    Default: aislgym
    NoEcho: true
    Description: Shared passphrase gate (same default as the AISL Gym)
  SessionSecret:
    Type: String
    NoEcho: true
    Description: Secret used to sign session cookies (keep stable across deploys)

Resources:
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  StudioFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ai-systmem-design-studio
      Runtime: nodejs22.x
      Architectures: [x86_64]
      Handler: run.sh
      MemorySize: 1024
      Timeout: 180
      Role: !GetAtt LambdaRole.Arn
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:28"
      Environment:
        Variables:
          NODE_ENV: production
          ZAI_API_KEY: !Ref ZaiApiKey
          ZAI_MODEL: !Ref ZaiModel
          ZAI_BASE_URL: !Ref ZaiBaseUrl
          STUDIO_PASSPHRASE: !Ref Passphrase
          SESSION_SECRET: !Ref SessionSecret
          # Lambda Web Adapter: run the Express app as a long-lived HTTP server
          # and stream Function URL responses (see lambda/server.ts + run.sh).
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          AWS_LWA_PORT: "8080"
          AWS_LWA_READINESS_CHECK_PATH: "/"

  # Public streaming endpoint. RESPONSE_STREAM + the Web Adapter above is what
  # defeats the API Gateway 30s buffer. AuthType NONE — the app's passphrase gate
  # remains the access control (same model as the AISL Gym).
  FunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !GetAtt StudioFunction.Arn
      AuthType: NONE
      InvokeMode: RESPONSE_STREAM

  FunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StudioFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      Condition:
        StringEquals:
          lambda:FunctionUrlAuthType: NONE

  RedirectRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # sds.dtcdev.click (still on the API Gateway custom domain + regional ACM cert)
  # now 301-redirects to the Function URL, preserving path/query. Keeps the
  # branded link alive without CloudFront or a us-east-1 cert.
  RedirectLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt RedirectRole.Arn
      Runtime: nodejs22.x
      MemorySize: 128
      Timeout: 3
      Environment:
        Variables:
          REDIRECT_TARGET: !GetAtt FunctionUrl.FunctionUrlUrl
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const base = (process.env.REDIRECT_TARGET || "").replace(/\/$/, "");
            const path = event.rawPath || "/";
            const query = event.rawQueryString ? "?" + event.rawQueryString : "";
            return {
              statusCode: 301,
              headers: {
                Location: base + path + query,
                "Cache-Control": "no-store"
              },
              body: ""
            };
          };

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: ai-systmem-design-studio
      ProtocolType: HTTP

  Integration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt RedirectLambda.Arn
      PayloadFormatVersion: '2.0'

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: $default
      Target: !Sub "integrations/${Integration}"

  DefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  InvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RedirectLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*"

  # Keep-warm: ping every 5 minutes so containers stay hot (no cold-start latency).
  WarmRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt StudioFunction.Arn
          Id: warm
          Input: '{"warmup": true}'

  WarmPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StudioFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WarmRule.Arn

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  ApiDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Ref DomainName
      DomainNameConfigurations:
        - CertificateArn: !Ref Certificate
          EndpointType: REGIONAL

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref ApiDomain
      Stage: !Ref DefaultStage

  AliasRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiDomain.RegionalHostedZoneId

Outputs:
  FunctionUrl:
    Value: !GetAtt FunctionUrl.FunctionUrlUrl
  CustomDomain:
    Value: !Sub "https://${DomainName}"
  FunctionName:
    Value: !Ref StudioFunction
