AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AI System Design Studio — Express app on Lambda served via API Gateway HTTP API
  with a custom domain (sds.dtcdev.click), an ACM cert (DNS-validated in Route53)
  and a Route53 alias. The Express app runs behind the Lambda Web Adapter (LWA) in
  buffered mode. Fully declarative CloudFormation. Stateless (no database).

  NOTE on streaming: the original plan was a streaming Function URL
  (RESPONSE_STREAM + LWA) so /api/interview/turn/stream could flush tokens. That
  is NOT possible in this account: an SCP blocks public lambda:InvokeFunctionUrl
  (every public Function URL, even a minimal throwaway, returns 403 Forbidden).
  API Gateway buffers Lambda responses, so the stream endpoint works but returns
  the whole reply at once (buffered) rather than token-by-token. See git history
  for the Function URL stack if streaming is ever needed in an account that allows
  public Function URLs.

Parameters:
  CodeBucket:
    Type: String
    Description: S3 bucket holding the built Lambda zip
  CodeKey:
    Type: String
    Description: S3 key of the Lambda zip
  DomainName:
    Type: String
    Default: sds.dtcdev.click
  HostedZoneId:
    Type: String
    Default: Z05963572WVWFHDQZH5NE
    Description: Route53 hosted zone id for dtcdev.click (authoritative zone)
  ZaiApiKey:
    Type: String
    NoEcho: true
    Description: Z.AI (Anthropic-compatible) API key
  ZaiModel:
    Type: String
    Default: glm-5.2
  ZaiBaseUrl:
    Type: String
    Default: https://api.z.ai/api/anthropic
  Passphrase:
    Type: String
    Default: aislgym
    NoEcho: true
    Description: Shared passphrase gate (same default as the AISL Gym)
  SessionSecret:
    Type: String
    NoEcho: true
    Description: Secret used to sign session cookies (keep stable across deploys)
  AuthBaseUrl:
    Type: String
    Default: https://auth.dtcdev.click
  AuthClientId:
    Type: String
    Description: Cognito app client ID for AI System Design Studio
  AuthIssuer:
    Type: String
    Description: Cognito user-pool issuer URL
  AuthJwksUrl:
    Type: String
    Description: Cognito user-pool JWKS URL

Resources:
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  StudioFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ai-systmem-design-studio
      Runtime: nodejs22.x
      Architectures: [x86_64]
      Handler: run.sh
      MemorySize: 1024
      Timeout: 60
      Role: !GetAtt LambdaRole.Arn
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:28"
      Environment:
        Variables:
          NODE_ENV: production
          ZAI_API_KEY: !Ref ZaiApiKey
          ZAI_MODEL: !Ref ZaiModel
          ZAI_BASE_URL: !Ref ZaiBaseUrl
          STUDIO_PASSPHRASE: !Ref Passphrase
          SESSION_SECRET: !Ref SessionSecret
          AUTH_BASE_URL: !Ref AuthBaseUrl
          AUTH_CLIENT_ID: !Ref AuthClientId
          AUTH_CALLBACK_URL: !Sub "https://${DomainName}/auth/callback"
          AUTH_LOGOUT_URL: !Sub "https://${DomainName}/"
          AUTH_ISSUER: !Ref AuthIssuer
          AUTH_JWKS_URL: !Ref AuthJwksUrl
          # Lambda Web Adapter: run the Express app as a long-lived HTTP server
          # and serve it behind the API Gateway (buffered). A streaming Function
          # URL is not used — the account's SCP blocks public lambda:InvokeFunctionUrl.
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: buffered
          AWS_LWA_PORT: "8080"
          AWS_LWA_READINESS_CHECK_PATH: "/"

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: ai-systmem-design-studio
      ProtocolType: HTTP

  Integration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt StudioFunction.Arn
      PayloadFormatVersion: '2.0'

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: $default
      Target: !Sub "integrations/${Integration}"

  DefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  InvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StudioFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*"

  # Keep-warm: ping every 5 minutes so containers stay hot (no cold-start latency).
  WarmRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt StudioFunction.Arn
          Id: warm
          Input: '{"warmup": true}'

  WarmPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StudioFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WarmRule.Arn

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  ApiDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Ref DomainName
      DomainNameConfigurations:
        - CertificateArn: !Ref Certificate
          EndpointType: REGIONAL

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref ApiDomain
      Stage: !Ref DefaultStage

  AliasRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiDomain.RegionalHostedZoneId

Outputs:
  ApiEndpoint:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  CustomDomain:
    Value: !Sub "https://${DomainName}"
  FunctionName:
    Value: !Ref StudioFunction
